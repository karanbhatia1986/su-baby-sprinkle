<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Host Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { width: 40px; }
  </style>
</head>
<body>

<h2>Host Dashboard</h2>

<div id="login">
  <input id="hostPass" type="password" placeholder="Host password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h3>Enter Correct Answers</h3>
  <div id="answerInputs"></div>
  <button onclick="scoreGame()">Score Game</button>

  <h3>Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB47Qw26hMQcKr2sC4B8i772wrhTMKo8Ho",
  authDomain: "su-baby-sprinkle.firebaseapp.com",
  databaseURL: "https://su-baby-sprinkle-default-rtdb.firebaseio.com",
  projectId: "su-baby-sprinkle",
  storageBucket: "su-baby-sprinkle.firebasestorage.app",
  messagingSenderId: "442824239099",
  appId: "1:442824239099:web:b90411c9d63d96cdb8cd5e",
  measurementId: "G-TQLMQ9K64W"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const correctPassword = "babyshower123"; // change this

function login() {
  if (document.getElementById("hostPass").value === correctPassword) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    renderAnswerInputs();
  }
}

const questions = [
  { text: "What is the most common birth month?", options: ["Jan","May","Aug","Dec"] },
  { text: "How long is a typical pregnancy?", options: ["36w","40w","42w","44w"] },
];

function renderAnswerInputs() {
  const div = document.getElementById("answerInputs");
  div.innerHTML = "";
  questions.forEach((q, i) => {
    div.innerHTML += `
      <p>${q.text}<br>
      Correct index: <input id="ans${i}" type="number" min="0" max="3"></p>
    `;
  });
}

function scoreGame() {
  db.ref("players").once("value", snap => {
    const players = snap.val() || {};
    const results = {};

    Object.keys(players).forEach(name => {
      let score = 0;
      const answers = players[name].answers || {};

      questions.forEach((q, i) => {
        const correct = Number(document.getElementById("ans" + i).value);
        if (answers[i] === correct) score++;
      });

      results[name] = score;
    });

    db.ref("results").set(results);
    renderLeaderboard(results);
  });
}

function renderLeaderboard(results) {
  const sorted = Object.entries(results).sort((a,b) => b[1] - a[1]);
  const div = document.getElementById("leaderboard");
  div.innerHTML = sorted.map(([name,score]) => `<p>${name}: ${score}</p>`).join("");
}
</script>

</body>
</html>
