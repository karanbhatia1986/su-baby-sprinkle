<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game - Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #f5576c;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .setup-section, .answer-section, .results-section {
            display: none;
        }

        .setup-section.active, .answer-section.active, .results-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f5576c;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .game-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .game-code {
            font-size: 36px;
            font-weight: 700;
            color: #f5576c;
            margin: 10px 0;
        }

        .players-list {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .players-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .player-item {
            padding: 10px;
            background: white;
            border-radius: 5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name {
            font-weight: 600;
        }

        .player-status {
            font-size: 12px;
            color: #666;
        }

        .question-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .question-number {
            color: #f5576c;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: #f5576c;
            background: #fff5f7;
        }

        .option.selected {
            border-color: #f5576c;
            background: #f5576c;
            color: white;
            font-weight: 600;
        }

        .option input[type="radio"] {
            width: auto;
            margin-right: 10px;
        }

        .progress-info {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #666;
        }

        .leaderboard {
            margin-top: 20px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #f5576c;
        }

        .leaderboard-item.first {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-left-color: #ffa500;
        }

        .leaderboard-item.second {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            border-left-color: #a0a0a0;
        }

        .leaderboard-item.third {
            background: linear-gradient(135deg, #cd7f32 0%, #e8b482 100%);
            border-left-color: #b5651d;
        }

        .player-rank {
            font-size: 24px;
            font-weight: 700;
            margin-right: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-score {
            font-size: 24px;
            font-weight: 700;
            color: #f5576c;
        }

        .secondary-btn {
            background: #6c757d;
            margin-top: 20px;
        }

        .secondary-btn:hover {
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Host Dashboard</h1>

        <!-- Setup Section -->
        <div class="setup-section active">
            <div class="input-group">
                <label for="hostPassword">Host Password</label>
                <input type="password" id="hostPassword" placeholder="Enter host password (create one for new game)">
            </div>
            <div class="input-group">
                <label for="gameCodeInput">Game Code (optional - will generate if empty)</label>
                <input type="text" id="gameCodeInput" placeholder="Leave empty to auto-generate" maxlength="6">
            </div>
            <button id="createGameBtn">Create Game</button>
            <button id="loadGameBtn" class="secondary-btn">Load Existing Game</button>
        </div>

        <!-- Answer Section -->
        <div class="answer-section">
            <div class="game-info">
                <div>Share this code with players:</div>
                <div class="game-code" id="displayGameCode"></div>
                <div style="margin-top: 10px; color: #666;">Players join at: player.html</div>
            </div>

            <div class="players-list">
                <h3>Connected Players (<span id="playerCount">0</span>)</h3>
                <div id="playersList"></div>
            </div>

            <div class="progress-info" id="progressInfo">
                Ready to start answering questions
            </div>

            <div id="questionsContainer"></div>

            <button id="startAnsweringBtn">Start Answering Questions</button>
            <button id="calculateScoresBtn" style="display: none;">Calculate Scores & Show Results</button>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div class="game-info">
                <h2 style="color: #f5576c; margin-bottom: 10px;">🏆 Final Results</h2>
                <div class="game-code" id="resultsGameCode"></div>
            </div>

            <div class="leaderboard" id="leaderboard"></div>

            <button id="newGameBtn" class="secondary-btn">Start New Game</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, set, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
  apiKey: "AIzaSyB47Qw26hMQcKr2sC4B8i772wrhTMKo8Ho",
  authDomain: "su-baby-sprinkle.firebaseapp.com",
  databaseURL: "https://su-baby-sprinkle-default-rtdb.firebaseio.com",
  projectId: "su-baby-sprinkle",
  storageBucket: "su-baby-sprinkle.firebasestorage.app",
  messagingSenderId: "442824239099",
  appId: "1:442824239099:web:b90411c9d63d96cdb8cd5e",
  measurementId: "G-TQLMQ9K64W"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentGameCode = '';
        let currentPassword = '';
        let hostAnswers = {};

        // Generate random game code
        function generateGameCode() {
            return Math.random().toString(36).substr(2, 6).toUpperCase();
        }

        // Create new game
        document.getElementById('createGameBtn').addEventListener('click', async () => {
            const password = document.getElementById('hostPassword').value.trim();
            let gameCode = document.getElementById('gameCodeInput').value.trim().toUpperCase();

            if (!password) {
                alert('Please enter a host password');
                return;
            }

            if (!gameCode) {
                gameCode = generateGameCode();
            }

            // Check if game code already exists
            const gameRef = ref(db, `games/${gameCode}`);
            const snapshot = await get(gameRef);

            if (snapshot.exists()) {
                alert('This game code already exists. Please choose another or leave empty to auto-generate.');
                return;
            }

            currentGameCode = gameCode;
            currentPassword = password;

            // Create game in Firebase
            await set(gameRef, {
                code: gameCode,
                password: password,
                status: 'waiting',
                questions: triviaQuestions,
                players: {},
                createdAt: Date.now()
            });

            loadGame();
        });

        // Load existing game
        document.getElementById('loadGameBtn').addEventListener('click', async () => {
            const password = document.getElementById('hostPassword').value.trim();
            const gameCode = document.getElementById('gameCodeInput').value.trim().toUpperCase();

            if (!password || !gameCode) {
                alert('Please enter both game code and password');
                return;
            }

            // Check if game exists and password matches
            const gameRef = ref(db, `games/${gameCode}`);
            const snapshot = await get(gameRef);

            if (!snapshot.exists()) {
                alert('Game not found');
                return;
            }

            const game = snapshot.val();
            if (game.password !== password) {
                alert('Incorrect password');
                return;
            }

            currentGameCode = gameCode;
            currentPassword = password;

            loadGame();
        });

        function loadGame() {
            document.querySelector('.setup-section').classList.remove('active');
            document.querySelector('.answer-section').classList.add('active');
            document.getElementById('displayGameCode').textContent = currentGameCode;

            // Listen for players
            listenToPlayers();
        }

        function listenToPlayers() {
            const playersRef = ref(db, `games/${currentGameCode}/players`);

            onValue(playersRef, (snapshot) => {
                const players = snapshot.val() || {};
                const playersList = document.getElementById('playersList');
                const playerCount = Object.keys(players).length;

                document.getElementById('playerCount').textContent = playerCount;

                playersList.innerHTML = '';

                Object.values(players).forEach(player => {
                    const answeredCount = Object.keys(player.answers || {}).length;
                    const totalQuestions = triviaQuestions.length;

                    const item = document.createElement('div');
                    item.className = 'player-item';
                    item.innerHTML = `
                        <span class="player-name">${player.name}</span>
                        <span class="player-status">${answeredCount}/${totalQuestions} answered</span>
                    `;
                    playersList.appendChild(item);
                });
            });
        }

        // Start answering questions
        document.getElementById('startAnsweringBtn').addEventListener('click', async () => {
            // Update game status
            await update(ref(db, `games/${currentGameCode}`), {
                status: 'playing'
            });

            // Hide start button and show questions
            document.getElementById('startAnsweringBtn').style.display = 'none';
            document.getElementById('progressInfo').textContent = 'Select the correct answer for each question';

            displayQuestions();
        });

        function displayQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            triviaQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card';

                const questionNumber = document.createElement('div');
                questionNumber.className = 'question-number';
                questionNumber.textContent = `Question ${index + 1} of ${triviaQuestions.length}`;

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = q.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                q.options.forEach((option, optIndex) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';

                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question-${q.id}`;
                    radio.value = optIndex;

                    const label = document.createElement('span');
                    label.textContent = option;

                    optionDiv.appendChild(radio);
                    optionDiv.appendChild(label);

                    optionDiv.addEventListener('click', () => {
                        radio.checked = true;
                        hostAnswers[q.id] = optIndex;

                        // Update visual selection
                        questionDiv.querySelectorAll('.option').forEach(opt => {
                            opt.classList.remove('selected');
                        });
                        optionDiv.classList.add('selected');

                        // Check if all questions answered
                        if (Object.keys(hostAnswers).length === triviaQuestions.length) {
                            document.getElementById('calculateScoresBtn').style.display = 'block';
                        }
                    });

                    optionsDiv.appendChild(optionDiv);
                });

                questionDiv.appendChild(questionNumber);
                questionDiv.appendChild(questionText);
                questionDiv.appendChild(optionsDiv);
                container.appendChild(questionDiv);
            });
        }

        // Calculate scores
        document.getElementById('calculateScoresBtn').addEventListener('click', async () => {
            const playersRef = ref(db, `games/${currentGameCode}/players`);
            const snapshot = await get(playersRef);
            const players = snapshot.val() || {};

            // Calculate scores for each player
            for (const [playerName, playerData] of Object.entries(players)) {
                let score = 0;
                const playerAnswers = playerData.answers || {};

                // Compare player answers with host answers
                Object.keys(hostAnswers).forEach(questionId => {
                    if (playerAnswers[questionId] === hostAnswers[questionId]) {
                        score += 10; // 10 points per correct answer
                    }
                });

                // Update player score
                await update(ref(db, `games/${currentGameCode}/players/${playerName}`), {
                    score: score
                });
            }

            // Update game status to finished
            await update(ref(db, `games/${currentGameCode}`), {
                status: 'finished',
                correctAnswers: hostAnswers
            });

            // Show results
            showResults();
        });

        async function showResults() {
            document.querySelector('.answer-section').classList.remove('active');
            document.querySelector('.results-section').classList.add('active');

            document.getElementById('resultsGameCode').textContent = currentGameCode;

            // Get final scores
            const playersRef = ref(db, `games/${currentGameCode}/players`);
            const snapshot = await get(playersRef);
            const players = Object.values(snapshot.val() || {});

            // Sort by score
            players.sort((a, b) => b.score - a.score);

            // Display leaderboard
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';

            players.forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'leaderboard-item';

                if (index === 0) item.classList.add('first');
                else if (index === 1) item.classList.add('second');
                else if (index === 2) item.classList.add('third');

                const rankSymbol = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;

                item.innerHTML = `
                    <div class="player-rank">${rankSymbol}</div>
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                    </div>
                    <div class="player-score">${player.score}</div>
                `;

                leaderboard.appendChild(item);
            });
        }

        // Start new game
        document.getElementById('newGameBtn').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
