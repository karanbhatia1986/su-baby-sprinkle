<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Game</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Baby Shower Game</h2>

<div id="join">
  <input id="nameInput" placeholder="Your name">
  <button onclick="joinGame()">Join Game</button>
</div>

<div id="questionArea" style="display:none;">
  <h3 id="qText"></h3>
  <div id="options"></div>
</div>

<div id="waiting" style="display:none;">
  <h3>Waiting for host to reveal results…</h3>
</div>

<div id="scoreArea" style="display:none;">
  <h2>Your Score:</h2>
  <h1 id="finalScore"></h1>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB47Qw26hMQcKr2sC4B8i772wrhTMKo8Ho",
  authDomain: "su-baby-sprinkle.firebaseapp.com",
  databaseURL: "https://su-baby-sprinkle-default-rtdb.firebaseio.com",
  projectId: "su-baby-sprinkle",
  storageBucket: "su-baby-sprinkle.firebasestorage.app",
  messagingSenderId: "442824239099",
  appId: "1:442824239099:web:b90411c9d63d96cdb8cd5e",
  measurementId: "G-TQLMQ9K64W"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerName = "";
let currentQuestion = 0;

const questions = [
  { text: "What is the most common birth month?", options: ["Jan","May","Aug","Dec"] },
  { text: "How long is a typical pregnancy?", options: ["36w","40w","42w","44w"] },
  // add up to 15
];

function joinGame() {
  playerName = document.getElementById("nameInput").value.trim();
  if (!playerName) return;

  db.ref("players/" + playerName).set({ answers: {} });

  document.getElementById("join").style.display = "none";
  showQuestion();
}

function showQuestion() {
  if (currentQuestion >= questions.length) {
    document.getElementById("questionArea").style.display = "none";
    document.getElementById("waiting").style.display = "block";
    return;
  }

  const q = questions[currentQuestion];
  document.getElementById("questionArea").style.display = "block";
  document.getElementById("qText").innerText = q.text;

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => submitAnswer(i);
    optDiv.appendChild(btn);
  });
}

function submitAnswer(i) {
  db.ref(`players/${playerName}/answers/${currentQuestion}`).set(i);
  currentQuestion++;
  showQuestion();
}

db.ref("results").on("value", snap => {
  const val = snap.val();
  if (!val) return;

  if (val[playerName] !== undefined) {
    document.getElementById("waiting").style.display = "none";
    document.getElementById("scoreArea").style.display = "block";
    document.getElementById("finalScore").innerText = val[playerName];
  }
});
</script>

</body>
</html>
